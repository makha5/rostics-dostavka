<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ростикс Доставка</title>
  <meta name="description" content="Ростикс Доставка — выберите город и оформите заказ через Едостав">
  <style>
    :root {
      --red: #e4001b;
      --black: #111111;
      --text: #171717;
      --muted: #777777;
      --line: #ededed;
      --bg: #ffffff;
      --soft: #fafafa;
      --shadow: 0 12px 34px rgba(0,0,0,.075);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #fff 0, #fff 45%, #f7f7f7 100%);
    }
    .page { width: min(720px, 100%); margin: 0 auto; padding: 30px 18px 24px; }
    .header { display: flex; justify-content: center; margin: 6px 0 28px; }
    .brand-image { display: block; width: min(280px, 70vw); height: auto; object-fit: contain; }
    h1 { margin: 0 0 24px; color: var(--black); font-size: clamp(31px, 8vw, 48px); line-height: .98; letter-spacing: -.045em; text-align: center; font-weight: 800; }
    .cities { display: grid; gap: 12px; }
    .city { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .city-button, .branch-link { width: 100%; border: 0; background: transparent; color: inherit; font: inherit; text-decoration: none; cursor: pointer; }
    .city-button { display: flex; align-items: center; gap: 12px; padding: 20px 18px; text-align: left; transition: transform .14s ease, background .14s ease; }
    .city-button:active { transform: scale(.985); }
    .pin { width: 34px; height: 34px; display: grid; place-items: center; flex: 0 0 auto; border-radius: 12px; background: rgba(228, 0, 27, .08); color: var(--red); }
    .pin svg { width: 18px; height: 18px; }
    .city-name { flex: 1; font-size: 21px; font-weight: 850; letter-spacing: -.02em; }
    .arrow { color: var(--red); font-size: 24px; line-height: 1; font-weight: 900; transition: transform .2s ease; }
    .city.open .arrow { transform: rotate(180deg); }
    .branches { display: grid; grid-template-rows: 0fr; padding: 0 12px; transition: grid-template-rows .22s ease, padding .22s ease; }
    .branches-inner { overflow: hidden; display: grid; gap: 8px; }
    .city.open .branches { grid-template-rows: 1fr; padding: 0 12px 12px; }
    .branch-link { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 14px 14px; border-radius: 14px; background: var(--soft); border: 1px solid var(--line); font-weight: 750; }
    .branch-link span:last-child { color: var(--red); font-size: 20px; }
    @media (hover:hover) { .city-button:hover, .branch-link:hover { background: #fff6f7; } .city:hover { transform: translateY(-1px); } .city { transition: transform .14s ease; } }
    @media (min-width:720px) { .cities { grid-template-columns: repeat(2, minmax(0, 1fr)); } .city:first-child { grid-column: 1/-1; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="header">
      <img class="brand-image" src="logo.webp" alt="Ростикс Доставка">
    </div>
    <h1>Ростикс Доставка</h1>
    <div class="cities" id="cities"></div>
  </main>

  <script src="cities.js"></script>
  <script>
    const citiesContainer = document.getElementById('cities');
    const pinIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7.6 2 4 5.6 4 10c0 6 8 12 8 12s8-6 8-12c0-4.4-3.6-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>`;

    function renderCities(cities) {
      const active = cities.filter(c => c.enabled);
      citiesContainer.innerHTML = '';
      
      active.forEach(city => {
        const branches = (city.branches || []).filter(b => b.enabled !== false);
        if (!branches.length) return;

        const cityEl = document.createElement('article');
        cityEl.className = 'city';
        
        const button = document.createElement('button');
        button.className = 'city-button';
        button.type = 'button';
        button.innerHTML = `<span class="pin">${pinIcon}</span><span class="city-name">${city.name}</span><span class="arrow">${branches.length > 1 ? '⌄' : '›'}</span>`;

        if (branches.length === 1) {
          button.addEventListener('click', () => window.location.href = branches[0].url);
          cityEl.appendChild(button);
          citiesContainer.appendChild(cityEl);
          return;
        }

        const branchList = document.createElement('div');
        branchList.className = 'branches';
        const branchInner = document.createElement('div');
        branchInner.className = 'branches-inner';
        
        branches.forEach(branch => {
          const link = document.createElement('a');
          link.className = 'branch-link';
          link.href = branch.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.innerHTML = `<span>${branch.name}</span><span>›</span>`;
          branchInner.appendChild(link);
        });
        
        branchList.appendChild(branchInner);
        
        button.addEventListener('click', () => {
          document.querySelectorAll('.city.open').forEach(openCity => {
            if (openCity !== cityEl) openCity.classList.remove('open');
          });
          cityEl.classList.toggle('open');
        });
        
        cityEl.appendChild(button);
        cityEl.appendChild(branchList);
        citiesContainer.appendChild(cityEl);
      });
    }

    renderCities(CITIES);
  </script>
</body>
</html>
